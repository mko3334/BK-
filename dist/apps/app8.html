<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>成長管理</title>
    <style>
        :root { --accent: #2da44e; --bg: #ffffff; --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); --border: #e2e8f0; --text: #1e293b; --text-muted: #64748b; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--text); padding: 24px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: var(--accent); font-size: 28px; margin-bottom: 32px; display: flex; align-items: center; gap: 12px; }
        .section { background: var(--bg); border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: var(--card-shadow); border: 1px solid var(--border); }
        .tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
        .tag-major { background: #f0fdf4; color: #166534; }
        .metric-card { padding: 16px; border: 1px solid var(--border); border-radius: 12px; text-align: center; }
        .metric-value { font-size: 32px; font-weight: 700; color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>🌱</span> 成長管理</h1>
        <div class="section">
            <span class="tag tag-major">大項目</span>
            <div style="font-size: 20px; font-weight: 700; margin-bottom: 12px;">療育・発達の促進</div>
            <div style="color: var(--text-muted); line-height: 1.6;">各児童の成長記録や発達検査の結果を分析し、最適な教育アプローチを提案します。</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 24px;">
                <div class="metric-card">
                    <div style="font-size: 12px; color: var(--text-muted);">今月の記録数</div>
                    <div class="metric-value">128</div>
                </div>
                <div class="metric-card">
                    <div style="font-size: 12px; color: var(--text-muted);">目標達成支援数</div>
                    <div class="metric-value">42</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
