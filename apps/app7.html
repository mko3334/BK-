<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>労務管理</title>
    <style>
        :root { --accent: #2da44e; --bg: #ffffff; --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); --border: #e2e8f0; --text: #1e293b; --text-muted: #64748b; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--text); padding: 24px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: var(--accent); font-size: 28px; margin-bottom: 32px; display: flex; align-items: center; gap: 12px; }
        .section { background: var(--bg); border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: var(--card-shadow); border: 1px solid var(--border); }
        .tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
        .tag-major { background: #f0fdf4; color: #166534; }
        .staff-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>👔</span> 労務管理</h1>
        <div class="section">
            <span class="tag tag-major">大項目</span>
            <div style="font-size: 20px; font-weight: 700; margin-bottom: 12px;">スタッフ評価・面談</div>
            <div style="color: var(--text-muted); line-height: 1.6;">従業員の勤務状況、スキルアップ、モチベーションの管理を行います。</div>
            <div style="margin-top: 20px;">
                <div class="staff-item">
                    <span>指導員 Aさん: 面談実施済み</span>
                    <span style="color: var(--accent);">3月10日</span>
                </div>
                <div class="staff-item" style="border-bottom: none;">
                    <span>指導員 Bさん: 次回面談予定</span>
                    <span style="color: var(--text-muted);">3月25日</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
