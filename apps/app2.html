<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>顧客管理</title>
    <style>
        :root { --accent: #2da44e; --bg: #ffffff; --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); --border: #e2e8f0; --text: #1e293b; --text-muted: #64748b; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--text); padding: 24px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: var(--accent); font-size: 28px; margin-bottom: 32px; display: flex; align-items: center; gap: 12px; }
        .section { background: var(--bg); border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: var(--card-shadow); border: 1px solid var(--border); }
        .tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
        .tag-major { background: #f0fdf4; color: #166534; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>👥</span> 顧客管理</h1>
        <div class="section">
            <span class="tag tag-major">大項目</span>
            <div style="font-size: 20px; font-weight: 700; margin-bottom: 12px;">顧客DB・顧客情報書き換え</div>
            <div style="color: var(--text-muted); line-height: 1.6;">スクールを利用する児童とその保護者の情報を一元管理します。</div>
            <table>
                <thead>
                    <tr>
                        <th>氏名</th>
                        <th>学年</th>
                        <th>ステータス</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>田中 太郎</td><td>小2</td><td>利用中</td></tr>
                    <tr><td>佐藤 花子</td><td>小1</td><td>利用中</td></tr>
                    <tr><td>鈴木 一郎</td><td>小3</td><td>体験中</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
