<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>予実管理</title>
    <style>
        :root { --accent: #2da44e; --bg: #ffffff; --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); --border: #e2e8f0; --text: #1e293b; --text-muted: #64748b; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--text); padding: 24px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: var(--accent); font-size: 28px; margin-bottom: 32px; display: flex; align-items: center; gap: 12px; }
        .section { background: var(--bg); border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: var(--card-shadow); border: 1px solid var(--border); }
        .tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
        .tag-major { background: #f0fdf4; color: #166534; }
        .progress-bar { width: 100%; height: 12px; background: #f1f5f9; border-radius: 6px; overflow: hidden; margin: 16px 0; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 6px; width: 75%; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>📈</span> 予実管理</h1>
        <div class="section">
            <span class="tag tag-major">大項目</span>
            <div style="font-size: 20px; font-weight: 700; margin-bottom: 12px;">予算・実績の可視化</div>
            <div style="color: var(--text-muted); line-height: 1.6;">今期の目標達成率と現在の進捗状況をリアルタイムで把握します。</div>
            <div style="margin-top: 24px; font-weight: 600;">目標達成率: 75%</div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <div style="display: flex; justify-content: space-between; color: var(--text-muted); font-size: 14px;">
                <span>現在の売上: ¥4,500,000</span>
                <span>目標: ¥6,000,000</span>
            </div>
        </div>
    </div>
</body>
</html>
