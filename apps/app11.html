<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>タスク管理</title>
    <style>
        :root { --accent: #2da44e; --bg: #ffffff; --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); --border: #e2e8f0; --text: #1e293b; --text-muted: #64748b; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--text); padding: 24px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: var(--accent); font-size: 28px; margin-bottom: 32px; display: flex; align-items: center; gap: 12px; }
        .section { background: var(--bg); border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: var(--card-shadow); border: 1px solid var(--border); }
        .tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
        .tag-major { background: #f0fdf4; color: #166534; }
        .todo-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .checkbox { width: 18px; height: 18px; border: 2px solid var(--accent); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>✅</span> タスク管理</h1>
        <div class="section">
            <span class="tag tag-major">大項目</span>
            <div style="font-size: 20px; font-weight: 700; margin-bottom: 12px;">業務TODO</div>
            <div style="color: var(--text-muted); line-height: 1.6;">スクール運営に必要な日々のタスクや締め切り事項を管理します。</div>
            <div style="margin-top: 20px;">
                <div class="todo-item">
                    <div class="checkbox"></div>
                    <span>個別支援計画の提出期限 (あと2日)</span>
                </div>
                <div class="todo-item">
                    <div class="checkbox"></div>
                    <span>車両通導点検の実施</span>
                </div>
                <div class="todo-item" style="border-bottom: none;">
                    <div class="checkbox"></div>
                    <span>月末報告書の作成</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
