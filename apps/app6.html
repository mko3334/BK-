<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>財務管理</title>
    <style>
        :root { --accent: #2da44e; --bg: #ffffff; --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); --border: #e2e8f0; --text: #1e293b; --text-muted: #64748b; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--text); padding: 24px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: var(--accent); font-size: 28px; margin-bottom: 32px; display: flex; align-items: center; gap: 12px; }
        .section { background: var(--bg); border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: var(--card-shadow); border: 1px solid var(--border); }
        .tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
        .tag-major { background: #f0fdf4; color: #166534; }
        .amount { font-size: 24px; font-weight: 700; color: var(--text); margin: 8px 0; }
        .label { color: var(--text-muted); font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>💰</span> 財務管理</h1>
        <div class="section">
            <span class="tag tag-major">大項目</span>
            <div style="font-size: 20px; font-weight: 700; margin-bottom: 12px;">売上・経費管理</div>
            <div style="color: var(--text-muted); line-height: 1.6;">スクール全体の収支状況を透明化し、経営判断をサポートします。</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 24px;">
                <div style="padding: 16px; background: #f8fafc; border-radius: 12px;">
                    <div class="label">今月売上</div>
                    <div class="amount">¥1,240,000</div>
                </div>
                <div style="padding: 16px; background: #fff5f5; border-radius: 12px;">
                    <div class="label">今月経費</div>
                    <div class="amount" style="color: #c53030;">¥850,000</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
