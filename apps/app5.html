<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>書類管理</title>
    <style>
        :root { --accent: #2da44e; --bg: #ffffff; --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); --border: #e2e8f0; --text: #1e293b; --text-muted: #64748b; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--text); padding: 24px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: var(--accent); font-size: 28px; margin-bottom: 32px; display: flex; align-items: center; gap: 12px; }
        .section { background: var(--bg); border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: var(--card-shadow); border: 1px solid var(--border); }
        .tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
        .tag-major { background: #f0fdf4; color: #166534; }
        .doc-list { list-style: none; }
        .doc-item { display: flex; justify-content: space-between; padding: 12px 16px; background: #fdfdfd; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; }
        .btn-view { font-size: 12px; color: var(--accent); font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>📄</span> 書類管理</h1>
        <div class="section">
            <span class="tag tag-major">大項目</span>
            <div style="font-size: 20px; font-weight: 700; margin-bottom: 12px;">個別支援計画・行政書類</div>
            <div style="color: var(--text-muted); line-height: 1.6;">重要な公的書類や支援計画書をデジタルアーカイブとして安全に保管します。</div>
            <div class="doc-list" style="margin-top: 20px;">
                <div class="doc-item">
                    <span>2024年度 個別支援計画案</span>
                    <a href="#" class="btn-view">開く</a>
                </div>
                <div class="doc-item">
                    <span>施設運営日誌 (3月分)</span>
                    <a href="#" class="btn-view">開く</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
